name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pull-requests: read
  actions: write

concurrency:
  group: ci-${{ github.event.pull_request.number || github.sha }}
  cancel-in-progress: true

jobs:
  changes:
    runs-on: ubuntu-latest
    outputs:
      code: ${{ steps.filter.outputs.code }}
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            code:
              - '!*.md'
              - '!design/**'
              - '!planning/**'
              - '!LICENSE'
              - '!.gitignore'

  ci:
    needs: changes
    if: needs.changes.outputs.code == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Check for new pragmas
        run: bash scripts/check_new_pragmas.sh

      - name: Check for new flaky markers
        run: bash scripts/check_new_flaky.sh

      - uses: astral-sh/setup-uv@v6
        with:
          enable-cache: true
          python-version: "3.14"

      - name: Install dependencies
        run: uv sync --frozen

      - name: ruff check
        run: uv run ruff check

      - name: ruff format --check
        run: uv run ruff format --check

      - name: mypy
        run: uv run mypy src/conductor

      - name: Run fast tests
        run: uv run pytest -m "not slow" --cov-fail-under=0

      - name: Run slow tests
        run: uv run pytest -m "slow" --cov-append || test $? -eq 5

      - name: Cancel workflow on CI failure
        if: failure()
        run: gh run cancel ${{ github.run_id }}
        env:
          GH_TOKEN: ${{ github.token }}
