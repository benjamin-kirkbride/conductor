fail_fast: true

repos:
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.15.5
    hooks:
      - id: ruff
        args: [--fix]
      - id: ruff-format

  - repo: local
    hooks:
      - id: pragma-check
        name: check for new pragmas
        entry: bash scripts/check_new_pragmas.sh
        language: system
        pass_filenames: false
        types: [python]

      - id: flaky-check
        name: check for new flaky markers
        entry: bash scripts/check_new_flaky.sh
        language: system
        pass_filenames: false
        types: [python]

      - id: mypy
        name: mypy
        entry: uv run --frozen mypy src/conductor
        language: system
        pass_filenames: false
        types: [python]

      - id: pytest-fast
        name: pytest (fast)
        entry: bash -c 'rm -f .coverage && uv run --frozen pytest -m "not slow" --cov-fail-under=0'
        language: system
        pass_filenames: false
        types: [python]

      - id: pytest-slow
        name: pytest (slow)
        entry: uv run --frozen pytest -m "slow" --cov-append
        language: system
        pass_filenames: false
        types: [python]
